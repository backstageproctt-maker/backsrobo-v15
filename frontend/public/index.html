<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="minimum-scale=1, initial-scale=1, width=device-width" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="color-scheme" content="light" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Whaticket · Carregando...</title>
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Força tema claro no login antes do primeiro paint (mantido) -->
  <script>
    (function () {
      var path = location.pathname || "/";
      var isLogin = /\/(login|signup|forgot-password)(\/|$|\?)/i.test(path) || path === "/";
      try {
        if (isLogin) {
          localStorage.setItem("theme", "light");
          document.documentElement.classList.remove("dark");
          document.documentElement.setAttribute("data-theme", "light");

          document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("login-page");
          });
        } else {
          var theme = localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.setAttribute("data-theme", "dark");
          } else {
            document.documentElement.classList.remove("dark");
            document.documentElement.setAttribute("data-theme", "light");
          }
        }
      } catch (e) {
        document.documentElement.classList.remove("dark");
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <style>
    :root {
      /* Cor principal (pode alterar com window.setSplashBrand('#hex')) */
      --brand: #22c55e;

      /* Visual mais clean */
      --bg: #f8fafc;
      --card: #ffffff;
      --stroke: #e5e7eb;
      --title: #0f172a;
      --text: #475569;
      --muted: #94a3b8;
    }

    html, body { height: 100%; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .splash-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      border: 3px solid rgba(148, 163, 184, 0.25);
      border-top-color: var(--brand);
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-track {
      height: 6px;
      border-radius: 9999px;
      overflow: hidden;
      background: #eef2f7;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--brand);
      transition: width .35s ease-in-out;
    }

    .splash-hide {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(6px) scale(0.98);
      transition: opacity .35s ease, transform .35s ease;
    }

    /* Inputs brancos no login (mantido do seu índice original) */
    body.login-page .MuiInputBase-root,
    body.login-page .MuiOutlinedInput-root,
    body.login-page .MuiOutlinedInput-input,
    body.login-page .MuiInputBase-input,
    body.login-page .MuiInputAdornment-root {
      background-color: #ffffff !important;
      color: #000000 !important;
    }
    body.login-page .MuiOutlinedInput-root.Mui-focused,
    body.login-page .MuiOutlinedInput-root.Mui-disabled,
    body.login-page .MuiOutlinedInput-root.Mui-error,
    body.login-page .MuiOutlinedInput-root.MuiInputBase-adornedStart,
    body.login-page .MuiOutlinedInput-root.MuiInputBase-adornedEnd,
    body.login-page .MuiOutlinedInput-root:hover {
      background-color: #ffffff !important;
      color: #000000 !important;
    }
    body.login-page .MuiOutlinedInput-notchedOutline {
      border-color: #e5e7eb !important;
    }
    body.login-page .MuiOutlinedInput-root:hover .MuiOutlinedInput-notchedOutline {
      border-color: #cbd5e1 !important;
    }
    body.login-page .MuiOutlinedInput-root.Mui-focused .MuiOutlinedInput-notchedOutline {
      border-color: #10b981 !important;
    }
    body.login-page input:-webkit-autofill,
    body.login-page input:-webkit-autofill:hover,
    body.login-page input:-webkit-autofill:focus {
      -webkit-text-fill-color: #000000 !important;
      transition: background-color 9999s ease-out 0s !important;
      box-shadow: 0 0 0px 1000px #ffffff inset !important;
    }
    body.login-page input:-moz-ui-invalid,
    body.login-page input:-moz-ui-valid {
      background-color: #ffffff !important;
      color: #000000 !important;
    }
  </style>

  <script>
    // Compat SharedArrayBuffer (mantido)
    if (!crossOriginIsolated) { /* eslint-disable-next-line */ SharedArrayBuffer = ArrayBuffer; }
  </script>
</head>

<body class="h-full antialiased">
  <!-- Splash Screen -->
  <div id="splash" class="fixed inset-0 flex items-center justify-center px-4">
    <div class="splash-card w-full max-w-md">
      <div class="px-7 py-8 sm:px-8 sm:py-9">
        <div class="flex items-center justify-between">
          <div class="space-y-1">
            <h1 class="text-lg font-semibold tracking-tight" style="color: var(--title);">
              Carregando
            </h1>
            <p class="text-sm" style="color: var(--muted);">
              Aguarde alguns segundos…
            </p>
          </div>
          <div class="spinner" aria-label="Carregando"></div>
        </div>

        <div class="mt-6 space-y-2">
          <div class="progress-track">
            <div id="progress" class="progress-bar"></div>
          </div>

          <div class="flex items-center justify-between text-xs" style="color: var(--muted);">
            <span>Inicializando</span>
            <span id="progress-label" class="font-semibold" style="color: var(--title);">0%</span>
          </div>
        </div>

        <div class="mt-6 flex items-center justify-between text-[11px]" style="color: var(--muted);">
          <span class="inline-flex items-center gap-2">
            <span class="h-1.5 w-1.5 rounded-full" style="background: var(--brand);"></span>
            Sistema online
          </span>
          <span id="app-version" class="font-medium tracking-wide">V.15.0.1</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Root da aplicação React -->
  <div id="root"></div>
  <noscript class="block px-6 py-4 text-sm">
    Você precisa habilitar o JavaScript para executar este app.
  </noscript>

  <script>
    // Setup inicial: permite trocar a cor de brand e (opcionalmente) a versão em runtime (mantido)
    (function setupBrand() {
      window.setSplashBrand = function (hex) {
        try { document.documentElement.style.setProperty('--brand', hex); } catch (e) {}
      };

      window.setAppVersion = function (v) {
        var versionLabel = document.getElementById("app-version");
        if (versionLabel) versionLabel.textContent = "V." + (v || "15.0.0");
      };

      window.setAppVersion("15.0.1");
    })();

    // Controle de progresso / saída do splash (mantido)
    (function bootProgress() {
      let p = 0;
      const bar = document.getElementById("progress");
      const label = document.getElementById("progress-label");
      const splash = document.getElementById("splash");

      // Progresso automático suave

      const timer = setInterval(() => {
        if (p < 55) p += 9;
        else if (p < 80) p += 3;
        else if (p < 98) p += Math.max(0.6, (99 - p) / 18);

        if (bar) bar.style.width = p + "%";
        if (label) label.textContent = Math.min(100, Math.round(p)) + "%";
      }, 700);

      window.finishProgress = () => {
        p = 100;
        if (bar) bar.style.width = "100%";
        if (label) label.textContent = "100%";
        clearInterval(timer);
        setTimeout(() => splash && splash.classList.add("splash-hide"), 250);
        setTimeout(() => splash && splash.remove(), 650);
      };
    })();
  </script>
</body>
</html>
